<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>K2 Perfumes — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Mulish:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  
  <!-- Supabase Live Client Database CDN -->
  <script src="https://jsdelivr.net"></script>

  <style>
    :root{--bg:#0a0a0a;--surface:#111118;--surface2:#1a1a24;--border:rgba(201,168,76,0.2);--gold:#c9a84c;--gold2:#e8c96a;--text:#f0ece0;--muted:#7a7060;--green:#22c55e;--red:#ef4444;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Mulish',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
    #login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 40% 40%,rgba(201,168,76,0.1) 0%,transparent 60%),var(--bg);}
    .login-box{background:var(--surface);border:1px solid var(--border);padding:48px 44px;width:420px;max-width:95vw;}
    .login-logo{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:var(--gold);letter-spacing:3px;margin-bottom:4px;}
    .login-sub{color:var(--muted);font-size:0.82rem;margin-bottom:36px;}
    .fg label{display:block;font-size:0.7rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold);font-weight:700;margin-bottom:8px;}
    .fg input{width:100%;padding:13px 16px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'Mulish',sans-serif;font-size:0.95rem;outline:none;transition:border-color 0.2s;}
    .fg input:focus{border-color:var(--gold);}
    .fg{margin-bottom:20px;}
    .login-btn{width:100%;padding:14px;background:var(--gold);color:#000;border:none;font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;letter-spacing:2px;text-transform:uppercase;transition:all 0.2s;margin-top:8px;}
    .login-btn:hover{background:var(--gold2);}
    .login-hint{text-align:center;margin-top:20px;font-size:0.78rem;color:var(--muted);background:var(--surface2);padding:12px;border:1px solid var(--border);}
    .lerr{color:var(--red);font-size:0.85rem;text-align:center;margin-top:12px;display:none;}
    #admin-app{display:none;min-height:100vh;}
    .layout{display:grid;grid-template-columns:240px 1fr;min-height:100vh;}
    .sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;}
    .sidebar-logo{padding:24px 20px 18px;border-bottom:1px solid var(--border);}
    .sidebar-logo h2{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;color:var(--gold);letter-spacing:3px;}
    .sidebar-logo p{color:var(--muted);font-size:0.65rem;letter-spacing:2px;text-transform:uppercase;margin-top:3px;}
    .sidebar-nav{padding:14px 10px;flex:1;}
    .nl{font-size:0.62rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);padding:0 12px;margin-bottom:6px;font-weight:700;margin-top:14px;}
    .ni{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;font-size:0.87rem;font-weight:500;color:var(--muted);transition:all 0.2s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left;font-family:'Mulish',sans-serif;}
    .ni:hover{background:var(--surface2);color:var(--text);}
    .ni.active{background:rgba(201,168,76,0.1);color:var(--gold);border-left:2px solid var(--gold);}
    .nb{margin-left:auto;background:var(--red);color:#fff;border-radius:2px;padding:2px 7px;font-size:0.67rem;font-weight:800;}
    .nb.gold{background:var(--gold);color:#000;}
    .sf{padding:14px 18px;border-top:1px solid var(--border);}
    .au{display:flex;align-items:center;gap:10px;}
    .av{width:34px;height:34px;background:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.88rem;color:#000;}
    .ai h4{font-size:0.85rem;font-weight:700;color:var(--gold);}
    .ai p{font-size:0.68rem;color:var(--muted);}
    .lb{margin-left:auto;background:none;border:1px solid var(--border);color:var(--muted);padding:5px 9px;cursor:pointer;font-size:0.75rem;transition:all 0.2s;}
    .lb:hover{border-color:var(--red);color:var(--red);}
    .main{background:var(--bg);overflow-y:auto;}
    .topbar{position:sticky;top:0;z-index:10;background:rgba(10,10,10,0.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;}
    .topbar h1{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:1px;}
    .tr{display:flex;gap:10px;align-items:center;}
    
    /* Buttons styles */
    .btn{padding:8px 18px;font-family:'Mulish',sans-serif;font-weight:600;font-size:0.8rem;cursor:pointer;transition:all 0.2s;border:none;letter-spacing:0.5px;}
    .bg{background:var(--gold);color:#000;}.bg:hover{background:var(--gold2);}
    .bo{background:transparent;color:var(--text);border:1px solid var(--border);}.bo:hover{border-color:var(--gold);color:var(--gold);}
    .bd{background:rgba(239,68,68,0.1);color:var(--red);border:1px solid rgba(239,68,68,0.2);}.bd:hover{background:var(--red);color:#fff;border-color:var(--red);}
    .bsm{padding:5px 12px;font-size:0.73rem;}
    
    .page{display:none;padding:28px;}
    .page.active{display:block;}
    .sg{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
    .sc{background:var(--surface);border:1px solid var(--border);padding:20px;position:relative;overflow:hidden;transition:transform 0.2s;}
    .sc:hover{transform:translateY(-3px);}
    .sc::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--gold);}
    .sl{font-size:0.68rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);font-weight:700;margin-bottom:10px;}
    .sv{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;color:var(--gold);margin-bottom:4px;}
    .ss{font-size:0.73rem;color:var(--muted);}
    .si{position:absolute;right:16px;top:16px;font-size:1.6rem;opacity:0.2;}
    .card{background:var(--surface);border:1px solid var(--border);padding:22px;margin-bottom:18px;}
    .ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
    .ch h3{font-family:'Syne',sans-serif;font-size:0.9rem;font-weight:700;letter-spacing:1px;}
    
    /* Product grid and forms styles inside panel */
    .pg{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
    .pac{background:var(--surface2);border:1px solid var(--border);overflow:hidden;transition:all 0.2s;}
    .pac:hover{border-color:var(--gold);}
    .piw{position:relative;height:200px;overflow:hidden;}
    .piw img{width:100%;height:100%;object-fit:cover;transition:transform 0.4s;}
    .pac:hover .piw img{transform:scale(1.05);}
    .no-img-box{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:4rem;background:var(--surface);}
    .psb{position:absolute;top:8px;left:8px;padding:3px 8px;font-size:0.65rem;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;}
    .ba{background:rgba(34,197,94,0.9);color:#fff;}.bl{background:rgba(245,200,66,0.9);color:#000;}.bo2{background:rgba(239,68,68,0.9);color:#fff;}
    .pai{padding:14px;}
    .pai h3{font-family:'Syne',sans-serif;font-size:0.95rem;font-weight:700;margin-bottom:3px;color:var(--gold);}
    .ps{font-size:0.7rem;color:var(--muted);letter-spacing:1px;margin-bottom:10px;}
    .psr{display:flex;justify-content:space-between;margin-bottom:10px;}
    .pst label{display:block;font-size:0.62rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:2px;}
    .pst span{font-family:'Syne',sans-serif;font-weight:700;font-size:0.95rem;}
    .gold{color:var(--gold);}.green{color:var(--green);}.red{color:var(--red);}
    .pa{display:flex;gap:6px;padding:10px 14px;border-top:1px solid var(--border);background:var(--surface);}
    
    /* Table Styling for Orders */
    .tw{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;}
    thead tr{border-bottom:1px solid var(--border);}
    thead th{padding:12px;text-align:left;font-size:0.65rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold);font-weight:700;white-space:nowrap;}
    tbody tr{border-bottom:1px solid var(--border);transition:background 0.15s;}
    tbody tr:hover{background:var(--surface2);}
    tbody td{padding:12px;font-size:0.85rem;color:var(--text);}
    
    /* Modern form inputs style for Product Creation Popup Modal */
    .admin-input-group { display: flex; flex-direction: column; margin-bottom:15px; }
    .admin-input-group label { font-size:0.7rem; text-transform:uppercase; color:var(--gold); font-weight:700; margin-bottom:5px; letter-spacing:1px;}
    .admin-input { width:100%; padding:10px; background:var(--surface2); border:1px solid var(--border); color:var(--text); font-family:inherit;}
    .admin-input:focus { border-color:var(--gold); outline:none;}
  </style>
</head>
<body>

  <!-- 1. LOGIN SCREEN -->
  <div id="login-screen">
    <div class="login-box">
      <div class="login-logo">K2 ADMIN</div>
      <div class="login-sub">Products aur Orders manage karein</div>
      <form id="login-form">
        <div class="fg">
          <label>Username</label>
          <input type="text" id="username-field" placeholder="k2admin" required value="k2admin"/>
        </div>
        <div class="fg">
          <label>Password</label>
          <input type="password" id="password-field" placeholder="••••••••••••" required value="k2perfumes123"/>
        </div>
        <button type="submit" class="login-btn">Sign In →</button>
      </form>
      <div class="lerr" id="login-error-msg">❌ Wrong credentials! Try again.</div>
      <div class="login-hint">Username: <b>k2admin</b> | Password: <b>k2perfumes123</b></div>
    </div>
  </div>
