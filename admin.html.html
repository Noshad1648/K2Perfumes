<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>K2 Perfumes — Admin Control Panel</title>
  <link href="https://googleapis.com" rel="stylesheet"/>
  
  <!-- Supabase CDN Link -->
  <script src="https://jsdelivr.net"></script>

  <style>
    :root{--bg:#0a0a0a;--surface:#111118;--surface2:#1a1a24;--border:rgba(201,168,76,0.2);--gold:#c9a84c;--gold2:#e8c96a;--text:#f0ece0;--muted:#7a7060;--green:#22c55e;--red:#ef4444;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Mulish',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
    
    /* Login System */
    #login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 40% 40%,rgba(201,168,76,0.1) 0%,transparent 60%),var(--bg);}
    .login-box{background:var(--surface);border:1px solid var(--border);padding:48px 44px;width:420px;max-width:95vw;}
    .login-logo{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:var(--gold);letter-spacing:3px;margin-bottom:4px;}
    .login-sub{color:var(--muted);font-size:0.82rem;margin-bottom:36px;}
    .fg label{display:block;font-size:0.7rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold);font-weight:700;margin-bottom:8px;}
    .fg input{width:100%;padding:13px 16px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'Mulish',sans-serif;font-size:0.95rem;outline:none;transition:border-color 0.2s;}
    .fg input:focus{border-color:var(--gold);}
    .fg{margin-bottom:20px;}
    .login-btn{width:100%;padding:14px;background:var(--gold);color:#000;border:none;font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;letter-spacing:2px;text-transform:uppercase;transition:all 0.2s;margin-top:8px;}
    .login-btn:hover{background:var(--gold2);}
    .login-hint{text-align:center;margin-top:20px;font-size:0.78rem;color:var(--muted);background:var(--surface2);padding:12px;border:1px solid var(--border);}
    .lerr{color:var(--red);font-size:0.85rem;text-align:center;margin-top:12px;display:none;}
    
    /* Professional Layout */
    #admin-app{display:none;min-height:100vh;}
    .layout{display:grid;grid-template-columns:260px 1fr;min-height:100vh;}
    .sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;}
    .sidebar-logo{padding:30px 24px;border-bottom:1px solid var(--border);}
    .sidebar-logo h2{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;color:var(--gold);letter-spacing:4px;}
    .sidebar-logo p{color:var(--muted);font-size:0.65rem;letter-spacing:2px;text-transform:uppercase;margin-top:3px;}
    
    .sidebar-nav{padding:20px 14px;flex:1;}
    .nl{font-size:0.65rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);padding:0 12px;margin-bottom:10px;font-weight:700;margin-top:20px;}
    .ni{display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer;font-size:0.9rem;font-weight:600;color:var(--muted);transition:all 0.2s;margin-bottom:4px;border:none;background:none;width:100%;text-align:left;font-family:'Mulish',sans-serif;}
    .ni:hover{background:var(--surface2);color:var(--text);}
    .ni.active{background:rgba(201,168,76,0.08);color:var(--gold);border-left:3px solid var(--gold);padding-left:11px;}
    
    .sf{padding:20px 24px;border-top:1px solid var(--border);background:var(--surface);}
    .au{display:flex;align-items:center;gap:12px;}
    .av{width:38px;height:38px;background:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1rem;color:#000;border-radius:4px;}
    .ai h4{font-size:0.9rem;font-weight:700;color:var(--gold);}
    .ai p{font-size:0.7rem;color:var(--muted);}
    .lb{margin-left:auto;background:none;border:1px solid var(--border);color:var(--muted);padding:6px 12px;cursor:pointer;font-size:0.75rem;transition:all 0.2s;}
    .lb:hover { border-color:var(--red); color:var(--red); }
    
    .main{background:var(--bg);overflow-y:auto;}
    .topbar{position:sticky;top:0;z-index:10;background:rgba(10,10,10,0.96);backdrop-filter:blur(15px);border-bottom:1px solid var(--border);padding:20px 40px;display:flex;align-items:center;justify-content:space-between;}
    .topbar h1{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:700;letter-spacing:1px;}
    
    /* Professional Dashboard Grid Widgets */
    .dashboard-container { padding: 40px; }
    .sg{display:grid;grid-template-columns:repeat(auto-fit, minmax(240px, 1fr));gap:20px;margin-bottom:40px;}
    .sc{background:var(--surface);border:1px solid var(--border);padding:25px;position:relative;overflow:hidden;border-radius:4px;}
    .sc::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--gold);}
    .sl{font-size:0.7rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);font-weight:700;margin-bottom:12px;}
    .sv{font-family:'Syne',sans-serif;font-size:2.2rem;font-weight:800;color:var(--gold);margin-bottom:4px;}
    
    /* Premium Forms Setup */
    .form-panel { background:var(--surface); border:1px solid var(--border); padding:35px; border-radius:4px; max-width:800px; margin:0 auto; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
    .form-panel h3 { font-family:'Syne',sans-serif; color:var(--gold); font-size:1.1rem; letter-spacing:1px; margin-bottom:25px; border-bottom:1px solid var(--border); padding-bottom:12px; text-transform:uppercase;}
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .full-width { grid-column: 1 / -1; }
    
    .input-box label { display:block; font-size:0.75rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; font-weight:600; }
    .input-box input, .input-box textarea { width: 100%; padding: 13px; background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-family: 'Mulish', sans-serif; font-size:0.95rem; outline:none; transition:all 0.3s; }
    .input-box input:focus, .input-box textarea:focus { border-color: var(--gold); }
    
    /* File Upload Styling Component */
    .file-upload-wrapper { position: relative; width: 100%; background: var(--surface2); border: 1px dashed var(--gold); padding: 20px; text-align: center; cursor: pointer; transition: all 0.3s; }
    .file-upload-wrapper:hover { background: rgba(201,168,76,0.05); }
    .file-upload-wrapper input[type="file"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
    .file-upload-text { color: var(--gold); font-size: 0.9rem; font-weight: 600; }
    .file-status { font-size: 0.75rem; color: var(--muted); margin-top: 6px; }

    .submit-action-btn { background: var(--gold); color: #000; border: none; padding: 15px; font-family:'Syne', sans-serif; font-size: 1rem; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%; margin-top: 10px; letter-spacing: 1px; transition: all 0.2s; }
    .submit-action-btn:hover { background: var(--gold2); transform: translateY(-2px); }
  </style>
</head>
<body>

  <!-- 1. PREMIUM LOGIN VIEW -->
  <div id="login-screen">
    <div class="login-box">
      <div class="login-logo">K2 ADMIN</div>
      <div class="login-sub">Premium Management Dashboard</div>
      
      <form id="admin-login-form" onsubmit="handleAdminLogin(event)" style="background:transparent; padding:0; border:none;">
        <div class="fg">
          <label>Username</label>
          <input type="text" id="admin-user" required autocomplete="off"/>
        </div>
        <div class="fg">
          <label>Password</label>
          <input type="password" id="admin-pass" required/>
        </div>
        <button type="submit" class="login-btn">Sign In →</button>
      </form>
      
      <div class="lerr" id="login-error">❌ Invalid credentials!</div>
      <div class="login-hint">
        Username: <strong>k2admin</strong> | Password: <strong>k2perfumes123</strong>
      </div>
    </div>
  </div>

  <!-- 2. ORIGINAL PROFESSIONAL PANEL INTERFACE -->
  <div id="admin-app">
    <div class="layout">
      
      <!-- Professional Sidebar Design -->
      <div class="sidebar">
        <div class="sidebar-logo">
          <h2>K2 PERFUMES</h2>
          <p>Management Portal</p>
        </div>
        <div class="sidebar-nav">
          <div class="nl">Overview</div>
          <button class="ni active">📊 Store Analytics</button>
          <button class="ni" onclick="alert('Orders tracking coming soon')">📦 Orders Tracking</button>
          <div class="nl">Configuration</div>
          <button class="ni" onclick="alert('Store Settings active')">⚙️ Global Settings</button>
        </div>
        <div class="sf">
          <div class="au">
            <div class="av">K2</div>
            <div class="ai">
              <h4>K2 Admin</h4>
              <p>Store Director</p>
            </div>
            <button class="lb" onclick="window.location.reload()">Exit</button>
          </div>
        </div>
      </div>

      <!-- Main Panel Workspace -->
      <div class="main">
        <div class="topbar">
          <h1># DASHBOARD OVERVIEW</h1>
          <div class="tr"><span style="color:var(--green); font-size:0.85rem; font-weight:700; letter-spacing:0.5px;">● CLOUD SYSTEM LIVE</span></div>
        </div>

        <div class="dashboard-container">
          <!-- Dynamic High Fidelity Metrics Cards -->
          <div class="sg">
            <div class="sc">
              <div class="sl">Total Orders Received</div>
              <div class="sv" id="stat-orders">0</div>
            </div>
            <div class="sc">
              <div class="sl">Active Store Products</div>
